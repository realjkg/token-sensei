# ── Sage Homeschool Tutor — hardened nginx configuration ─────────────────────
#
# Security model:
#   1. auth_request to /api/auth/validate before serving ANY content
#   2. Unauthenticated requests get the React SPA index.html (login page only)
#      — the SPA itself enforces the voice+PIN gate client-side
#   3. Strict Content-Security-Policy blocks inline scripts, eval, and
#      connections to any origin other than this server
#   4. HSTS preload ensures future connections are always HTTPS
#   5. No server version disclosure
#   6. Streaming SSE responses are never buffered
#   7. Audio uploads limited to 12 MB

server {
    listen 80;
    server_tokens off;                         # hide nginx version

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12m;                  # audio upload ceiling

    # ── Security headers (complement backend headers) ─────────────────────────
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options              "DENY" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "no-referrer" always;
    add_header Permissions-Policy           "camera=(), geolocation=(), payment=(), usb=(), microphone=(self)" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; media-src 'self' blob:; worker-src 'self' blob:; frame-ancestors 'none'; form-action 'self'; base-uri 'self';"
        always;

    # ── SSO auth-check subrequest ─────────────────────────────────────────────
    # The /auth-check location calls the backend /auth/validate.
    # If the backend returns 401, nginx returns 401 to the browser.
    # The React SPA intercepts this and routes to the login page.
    # Static assets (JS/CSS) are exempt — they carry no sensitive data.
    location = /auth-check {
        internal;
        proxy_pass              http://api:8000/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        Authorization $http_authorization;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        User-Agent $http_user_agent;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass              http://api:8000/;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        User-Agent $http_user_agent;

        # SSE streaming — never buffer, never cache
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      300s;
        chunked_transfer_encoding on;

        # No download headers on API responses
        add_header Content-Disposition "inline" always;

        # Block direct access to internal-only paths
        location ~ ^/api/(debug|export|download|dump|backup) {
            return 404;
        }
    }

    # ── Static assets: exempt from auth-check ─────────────────────────────────
    # JS/CSS carry no user data — no auth required to load them.
    # The React app is a blank shell until the user authenticates.
    location ~* \.(js|css|woff2?|svg|ico|png|jpg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA entrypoint: auth-check required ───────────────────────────────────
    # index.html triggers the auth-check. On 401, the React app's AppShell
    # detects the unauthenticated state and shows the login page.
    # There is no separate "public" login page — the SPA IS the login page.
    location = / {
        auth_request /auth-check;
        error_page 401 = @unauthenticated;
        try_files /index.html =404;
    }

    location / {
        auth_request /auth-check;
        error_page 401 = @unauthenticated;
        try_files $uri $uri/ /index.html;
    }

    # On 401: serve the SPA (which shows the login/voice-auth screen)
    # Do NOT redirect to an external URL — keep everything within the system
    location @unauthenticated {
        # Serve the SPA without caching — it will render the auth gate
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /index.html =404;
    }

    # ── Deny hidden files and sensitive paths ─────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(enc|salt|log|json|py|env|key)$ {
        deny all;
        return 404;
    }
}
